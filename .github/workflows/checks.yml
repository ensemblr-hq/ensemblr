name: Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: millionco/react-doctor@v2
        with:
          diff: master
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: error
          verbose: "true"
